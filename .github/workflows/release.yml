name: Release

# Publishes TasmanianDevil + TasmanianDevil.Onnx to NuGet on a version tag, e.g.
# `git tag v0.1.0 && git push origin v0.1.0`.
# Note: TasmanianDevil.Onnx depends on Kyoto, so publish the Kyoto package first.
on:
  push:
    tags: ['v*']

permissions:
  id-token: write   # required for the OIDC token exchange
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Provision empty local feed
        run: mkdir -p ../.local-nuget

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: dotnet test TasmanianDevil.slnx -c Release

      - name: Pack
        run: |
          dotnet pack src/TasmanianDevil/TasmanianDevil.csproj -c Release -p:Version=${{ steps.ver.outputs.version }} -o artifacts
          dotnet pack src/TasmanianDevil.Onnx/TasmanianDevil.Onnx.csproj -c Release -p:Version=${{ steps.ver.outputs.version }} -o artifacts

      - name: NuGet trusted publishing login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
