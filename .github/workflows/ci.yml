name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # nuget.config references a sibling local feed for cross-repo dev; create it empty in CI
      # so restore is happy. The Kyoto dependency (for TasmanianDevil.Onnx) resolves from nuget.org.
      - name: Provision empty local feed
        run: mkdir -p ../.local-nuget

      - name: Restore
        run: dotnet restore TasmanianDevil.slnx

      - name: Build
        run: dotnet build TasmanianDevil.slnx -c Release --no-restore

      - name: Test
        run: dotnet test TasmanianDevil.slnx -c Release --no-build --verbosity normal
